version: '3.8'

services:
  backend:
    build: ./backend
    container_name: mami_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # Kodu değiştirirsen anında yansısın diye

  frontend:
    build: ./frontend
    container_name: mami_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend # Önce backend ayağa kalksın, sonra frontend